<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 480" width="1320" height="480">
  <defs>
    <!-- Glow filter for the icon motion effect -->
    <filter id="orangeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow for icon -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#FF6B00" flood-opacity="0.4"/>
    </filter>
    <!-- Motion glow on left side -->
    <radialGradient id="motionGlow" cx="0%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#FF8800" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#FF6600" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF6600" stop-opacity="0"/>
    </radialGradient>
    <!-- Icon background gradient -->
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8800"/>
      <stop offset="100%" stop-color="#E85500"/>
    </linearGradient>
    <!-- Arrow gradient for icon -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFE0C0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <!-- Crown glow radial gradient -->
    <radialGradient id="crownGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FFA500" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF8800" stop-opacity="0"/>
    </radialGradient>
    <!-- Metallic silver gradient for Strava -->
    <linearGradient id="stravaMetallic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F0F0F0"/>
      <stop offset="30%"  stop-color="#CCCCCC"/>
      <stop offset="55%"  stop-color="#888888"/>
      <stop offset="75%"  stop-color="#BBBBBB"/>
      <stop offset="100%" stop-color="#DDDDDD"/>
    </linearGradient>
  </defs>

  <!-- Black background -->
  <rect width="1320" height="480" fill="#000000"/>

  <!-- === LEFT ICON === -->
  <g transform="translate(60, 80)">
    <!-- Motion glow streaks behind icon -->
    <ellipse cx="-10" cy="155" rx="90" ry="18" fill="#FF8800" opacity="0.25" transform="rotate(-5, -10, 155)"/>
    <ellipse cx="-20" cy="175" rx="70" ry="12" fill="#FF6600" opacity="0.18" transform="rotate(-3, -20, 175)"/>
    <ellipse cx="-15" cy="195" rx="55" ry="9" fill="#FF5500" opacity="0.12" transform="rotate(-2, -15, 195)"/>

    <!-- Orange rounded square icon -->
    <rect x="0" y="0" width="300" height="300" rx="55" ry="55" fill="url(#iconBg)" filter="url(#iconShadow)"/>

    <!-- Speed lines above arrow -->
    <rect x="40" y="90" width="145" height="18" rx="9" fill="url(#arrowGrad)" opacity="0.55"/>
    <rect x="40" y="62" width="115" height="14" rx="7" fill="url(#arrowGrad)" opacity="0.38"/>

    <!-- Speed lines below arrow -->
    <rect x="40" y="200" width="145" height="18" rx="9" fill="url(#arrowGrad)" opacity="0.55"/>
    <rect x="40" y="232" width="115" height="14" rx="7" fill="url(#arrowGrad)" opacity="0.38"/>

    <!-- Main arrow -->
    <!-- Arrow shaft -->
    <rect x="40" y="148" width="145" height="26" rx="5" fill="white"/>
    <!-- Arrow head -->
    <polygon points="175,108 255,161 175,214" fill="white"/>
  </g>

  <!-- === RIGHT TEXT === -->
  <g transform="translate(400, 70)">

    <!-- "Strava" text - light gray, bold italic -->
    <text
      x="0" y="155"
      font-family="Arial Black, Impact, sans-serif"
      font-size="148"
      font-weight="900"
      font-style="italic"
      fill="#FFFFFF"
      letter-spacing="-2"
    >Strava</text>

    <!-- "Wind" text - "Win" orange, "d" gray -->
    <text
      x="512" y="155"
      font-family="Arial Black, Impact, sans-serif"
      font-size="148"
      font-weight="900"
      font-style="italic"
      letter-spacing="-2"
    ><tspan fill="#FF6600">Win</tspan><tspan fill="#FFFFFF">d</tspan></text>

    <!-- Cover the dot of the "i" in Wind with black -->
    <ellipse cx="707" cy="48" rx="30" ry="26" fill="#000000"/>

    <!-- Yellow crown replacing the dot of the "i" (diamond cutout style) -->
    <g transform="translate(707, 50)">
      <path fill-rule="evenodd"
            d="M -22,16 L -22,0 L -13,-22 L -5,-5 L 0,-28 L 5,-5 L 13,-22 L 22,0 L 22,16 Z
               M 0,-5 L 9,4 L 0,13 L -9,4 Z"
            fill="#FFD700"/>
    </g>

    <!-- Divider line left -->
    <line x1="0" y1="185" x2="185" y2="185" stroke="#CC4400" stroke-width="2.5"/>
    <!-- Divider line right -->
    <line x1="720" y1="185" x2="890" y2="185" stroke="#CC4400" stroke-width="2.5"/>

    <!-- "WIN MORE SEGMENTS" tagline -->
    <text
      x="445" y="220"
      font-family="Arial, Helvetica, sans-serif"
      font-size="30"
      font-weight="700"
      fill="#FFFFFF"
      letter-spacing="6"
      text-anchor="middle"
    >WIN MORE SEGMENTS</text>

  </g>
</svg>
